<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>しかバトン Wiki Explorer</title>
    <link rel="preconnect" href="https://shikabaton.miraheze.org">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="desktop" aria-label="しかバトン Wiki デスクトップ">
      <header class="desktop-title">
        <h1>しかバトン Wiki Explorer</h1>
        <p>カテゴリをフォルダーのように歩いて、記事を開いてみよう。</p>
      </header>

      <nav class="desktop-icons" aria-label="デスクトップ アイコン">
        <button class="desktop-icon" data-launch="categories">
          <span class="icon folder" aria-hidden="true"></span>
          <span>しかバトン Wiki</span>
        </button>
        <button class="desktop-icon" data-launch="search">
          <span class="icon search" aria-hidden="true"></span>
          <span>記事を検索</span>
        </button>
        <button class="desktop-icon" data-launch="changes">
          <span class="icon changes" aria-hidden="true"></span>
          <span>最近の更新</span>
        </button>
        <button class="desktop-icon" data-launch="readme">
          <span class="icon text" aria-hidden="true"></span>
          <span>Readme.txt</span>
        </button>
      </nav>

      <section id="windows" aria-live="polite"></section>
    </main>

    <footer class="taskbar">
      <button id="start-button" class="start-button" aria-expanded="false">
        <span class="windows-mark" aria-hidden="true"></span>
        start
      </button>
      <section id="task-buttons" class="task-buttons" aria-label="開いているウィンドウ"></section>
      <div class="tray">
        <span id="connection-light" class="connection-light checking" title="接続確認中"></span>
        <time id="clock"></time>
      </div>
    </footer>

    <section id="start-menu" class="start-menu" hidden>
      <div class="start-user">しかバトン Wiki</div>
      <button data-launch="categories"><span class="mini-folder"></span> Wiki Explorer</button>
      <button data-launch="search">検索</button>
      <button data-launch="changes">最近の更新</button>
      <hr>
      <a href="https://shikabaton.miraheze.org/wiki/" target="_blank" rel="noopener">元のWikiを開く</a>
    </section>

    <template id="window-template">
      <article class="window" role="dialog">
        <header class="titlebar">
          <h2></h2>
          <div class="window-controls">
            <button class="minimize" aria-label="最小化">_</button>
            <button class="close" aria-label="閉じる">×</button>
          </div>
        </header>
        <div class="toolbar"></div>
        <div class="window-body"></div>
        <footer class="statusbar"></footer>
      </article>
    </template>
    <script src="./app.js" defer></script>
  </body>
</html>
